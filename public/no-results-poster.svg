<svg width="500" height="750" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="noResultsGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="750" fill="url(#noResultsGradient)" stroke="#444" stroke-width="2"/>
  
  <!-- Search Icon -->
  <circle cx="250" cy="200" r="50" fill="#888888" opacity="0.1"/>
  <circle cx="235" cy="185" r="20" fill="none" stroke="#888888" stroke-width="3"/>
  <line x1="250" y1="200" x2="270" y2="220" stroke="#888888" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Main No Results Text -->
  <text x="250" y="320" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">No Results</text>
  
  <!-- Description -->
  <text x="250" y="380" font-family="Arial, sans-serif" font-size="16" fill="#cccccc" text-anchor="middle">No content found</text>
  <text x="250" y="410" font-family="Arial, sans-serif" font-size="16" fill="#cccccc" text-anchor="middle">matching your search</text>
  
  <!-- Help Text -->
  <text x="250" y="480" font-family="Arial, sans-serif" font-size="14" fill="#888888" text-anchor="middle">Try different keywords</text>
  <text x="250" y="505" font-family="Arial, sans-serif" font-size="14" fill="#888888" text-anchor="middle">or adjust your search</text>
  
  <!-- Bottom decoration -->
  <rect x="100" y="680" width="300" height="2" fill="#444"/>
  <text x="250" y="720" font-family="Arial, sans-serif" font-size="12" fill="#666666" text-anchor="middle">AI Search Addon</text>
</svg> 