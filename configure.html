<!DOCTYPE html>
<html>
<head>
    <title>AI Search Configuration</title>
    <style>
        .stremio-button {
            background-color: #8A5AAB;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        .stremio-button:hover {
            background-color: #6B4484;
        }
        #configUrl {
            word-break: break-all;
            margin: 10px 0;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h2>AI Search Configuration</h2>
    <p>Enter your OpenAI API key:</p>
    <input type="text" id="openaiKey" placeholder="sk-...">
    <button onclick="testKey()">Test API Key</button>
    <div id="status" class="status"></div>
    
    <div id="confirm-section" style="display: none;">
        <h3>API Key Verified</h3>
        <p>Click below to save the configuration:</p>
        <button id="saveButton" class="stremio-button" onclick="saveConfig()">Save Configuration</button>
        <div id="configUrl"></div>
        <div id="manualInstructions" style="display: none;">
            <p>If the button doesn't work:</p>
            <ol>
                <li>Copy the URL below</li>
                <li>Open Stremio</li>
                <li>Paste the URL in Stremio's addon section</li>
            </ol>
            <button class="stremio-button" onclick="copyUrl()">Copy URL</button>
        </div>
    </div>

    <div id="logs"></div>

    <script>
        let stremioUrl = '';

        function log(message) {
            console.log(new Date().toISOString() + ': ' + message);
            const logsDiv = document.getElementById('logs');
            if (logsDiv) {
                logsDiv.innerHTML += new Date().toISOString() + ': ' + message + '<br>';
            }
        }

        function showStatus(message, success) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = 'status ' + (success ? 'success' : 'error');
        }

        async function testKey() {
            try {
                const key = document.getElementById('openaiKey').value;
                log('Testing API key...');
                
                if (!key) {
                    showStatus('Please enter an API key', false);
                    return;
                }

                log('Making test request to OpenAI API...');
                const response = await fetch('https://api.openai.com/v1/models', {
                    headers: {
                        'Authorization': `Bearer ${key}`
                    }
                });

                log('Response status: ' + response.status);

                if (response.ok) {
                    log('API key verified successfully');
                    showStatus('API key verified successfully', true);
                    document.getElementById('confirm-section').style.display = 'block';
                } else {
                    throw new Error('Invalid API key');
                }
            } catch (error) {
                log('Error: ' + error.message);
                showStatus('Error: ' + error.message, false);
                document.getElementById('confirm-section').style.display = 'none';
            }
        }

        function saveConfig() {
            try {
                log('Saving configuration...');
                const key = document.getElementById('openaiKey').value;
                const config = { openaiKey: key };
                
                log('Configuration object created: ' + JSON.stringify(config));
                const encodedConfig = encodeURIComponent(JSON.stringify(config));
                
                // Determine if we're in development or production
                const isDevelopment = window.location.hostname === '127.0.0.1' || 
                                    window.location.hostname === 'localhost';
                
                // Create the redirect URL
                stremioUrl = isDevelopment
                    ? `stremio://127.0.0.1:7000/manifest.json?configuration=${encodedConfig}`
                    : `stremio://itcon-pty-au.github.io/stremio-ai-search/manifest.json?configuration=${encodedConfig}`;
                
                log('Generated Stremio URL: ' + stremioUrl);
                
                // Show the URL
                document.getElementById('configUrl').textContent = stremioUrl;
                document.getElementById('manualInstructions').style.display = 'block';
                
                // Try to open Stremio
                window.location = stremioUrl;
                
                // Show manual instructions after a delay
                setTimeout(() => {
                    document.getElementById('manualInstructions').style.display = 'block';
                }, 2000);
            } catch (error) {
                log('Error saving configuration: ' + error.message);
                showStatus('Error saving configuration: ' + error.message, false);
            }
        }

        function copyUrl() {
            navigator.clipboard.writeText(stremioUrl).then(() => {
                alert('URL copied to clipboard!');
            }).catch(err => {
                alert('Failed to copy URL: ' + err);
            });
        }

        // Add this to check if the script is loading
        window.addEventListener('load', function() {
            log('Configure page loaded');
            log('Current hostname: ' + window.location.hostname);
            log('Development mode: ' + (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost'));
        });
    </script>
</body>
</html>
