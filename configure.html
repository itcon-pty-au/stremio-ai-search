<!DOCTYPE html>
<html>
<head>
    <title>AI Search Configuration</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
        input { width: 100%; padding: 8px; margin: 8px 0; }
        button { background: #4CAF50; color: white; padding: 10px; border: none; cursor: pointer; margin-bottom: 20px; }
        .status { margin-top: 20px; padding: 10px; white-space: pre-wrap; }
        .success { background: #dff0d8; color: #3c763d; }
        .error { background: #f2dede; color: #a94442; }
        #logs { 
            margin-top: 20px; 
            padding: 10px; 
            background: #f8f9fa; 
            font-family: monospace; 
            white-space: pre-wrap; 
            border: 1px solid #ddd;
            max-height: 400px;
            overflow-y: auto;
        }
        .confirm-section {
            margin-top: 20px;
            padding: 10px;
            background: #e8f5e9;
            display: none;
        }
    </style>
</head>
<body>
    <h2>AI Search Configuration</h2>
    <p>Enter your OpenAI API key:</p>
    <input type="text" id="openaiKey" placeholder="sk-...">
    <button onclick="testKey()">Test API Key</button>
    <div id="status" class="status"></div>
    
    <div id="confirm-section" class="confirm-section">
        <h3>API Key Verified</h3>
        <p>The API key has been verified successfully. Click below to save the configuration:</p>
        <button onclick="saveConfig()">Save Configuration</button>
    </div>

    <h3>Logs:</h3>
    <div id="logs"></div>

    <script>
        function log(message) {
            console.log(new Date().toISOString() + ': ' + message);
            const logsDiv = document.getElementById('logs');
            if (logsDiv) {
                logsDiv.innerHTML += new Date().toISOString() + ': ' + message + '<br>';
            }
        }

        function showStatus(message, success) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = 'status ' + (success ? 'success' : 'error');
        }

        async function testKey() {
            try {
                const key = document.getElementById('openaiKey').value;
                log('Testing API key...');
                
                if (!key) {
                    showStatus('Please enter an API key', false);
                    return;
                }

                log('Making test request to OpenAI API...');
                const response = await fetch('https://api.openai.com/v1/models', {
                    headers: {
                        'Authorization': `Bearer ${key}`
                    }
                });

                log('Response status: ' + response.status);

                if (response.ok) {
                    log('API key verified successfully');
                    showStatus('API key verified successfully', true);
                    document.getElementById('confirm-section').style.display = 'block';
                } else {
                    throw new Error('Invalid API key');
                }
            } catch (error) {
                log('Error: ' + error.message);
                showStatus('Error: ' + error.message, false);
                document.getElementById('confirm-section').style.display = 'none';
            }
        }

        function saveConfig() {
            try {
                log('Saving configuration...');
                const key = document.getElementById('openaiKey').value;
                const config = { openaiKey: key };
                
                log('Configuration object created: ' + JSON.stringify(config));
                const encodedConfig = encodeURIComponent(JSON.stringify(config));
                
                // Create the Stremio protocol URL with local server
                const redirectUrl = `stremio://itcon-pty-au.github.io/stremio-ai-search/manifest.json?configuration=${encodedConfig}`;
                log('Redirecting to: ' + redirectUrl);
                
                window.location.href = redirectUrl;
            } catch (error) {
                log('Error saving configuration: ' + error.message);
                showStatus('Error saving configuration: ' + error.message, false);
            }
        }

        // Add this to check if the script is loading
        window.addEventListener('load', function() {
            log('Configure page loaded');
            if (window.fetch) {
                log('Fetch API is available');
            } else {
                log('Fetch API is not available');
            }
        });
    </script>
</body>
</html>
